  <div class="card">
    <h1>Баярлалаа.</h1>
    <p>Чиний бичсэн зүйлийг хүлээж авлаа. Яг одоо бүх зүйл тодорхойгүй, хүнд санагдаж байж магадгүй. Гэхдээ чи ганцаараа биш.</p>
    <p>Зарим өдөр давж гарахад л хангалттай байдаг. Өнөөдөр чи заавал бүхнийг шийдэх албагүй.</p>
